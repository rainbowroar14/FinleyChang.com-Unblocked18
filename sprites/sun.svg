<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" shape-rendering="crispEdges">
  <rect width="64" height="64" fill="none"/>
  <!-- rays -->
  <g fill="#f4c430" stroke="#1a1a1a" stroke-width="1">
    <rect x="30" y="4" width="4" height="8"/>
    <rect x="30" y="52" width="4" height="8"/>
    <rect x="4" y="30" width="8" height="4"/>
    <rect x="52" y="30" width="8" height="4"/>
    <rect x="12" y="12" width="6" height="4" transform="rotate(-45 15 14)"/>
    <rect x="46" y="12" width="6" height="4" transform="rotate(45 49 14)"/>
    <rect x="12" y="48" width="6" height="4" transform="rotate(45 15 50)"/>
    <rect x="46" y="48" width="6" height="4" transform="rotate(-45 49 50)"/>
  </g>
  <!-- core -->
  <rect x="18" y="18" width="28" height="28" fill="#ffe566" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="22" y="20" width="12" height="10" fill="#fff4a8"/>
  <rect x="34" y="32" width="10" height="12" fill="#e6b820"/>
  <rect x="22" y="36" width="8" height="8" fill="#d4a010"/>
